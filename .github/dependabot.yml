# Dependabot configuration
# Automatically opens PRs to keep dependencies up to date
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # ---- Python pip dependencies ----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Ignore torch major version bumps (breaking changes)
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "torch-geometric"
        update-types: ["version-update:semver-major"]

  # ---- GitHub Actions ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
